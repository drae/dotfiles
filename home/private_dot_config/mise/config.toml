cloudflared = '2026.3.0'
direnv = '2.37.1'
doggo = '1.0.5'
fastfetch = '2.62.1'
fd = '10.2.0'
fzf = '0.72.0'
github-cli = '2.92.0'
golang = '1.26.2'
jq = '1.8.1'
lazygit = '0.61.1'
"aqua:mitsuhiko/minijinja" = '2.19.0'
"asdf:neovim" = '0.11.3'
nodejs = '24.15.0'
pipx = '1.11.1'
python = '3.14.4'
ripgrep = '15.1.0'
